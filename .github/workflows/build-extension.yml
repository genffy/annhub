name: Build Extension

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      artifact-name:
        description: "Name of the uploaded artifact"
        value: ${{ jobs.build.outputs.artifact-name }}
      zip-name:
        description: "Chrome Web Store package file name"
        value: ${{ jobs.build.outputs.zip-name }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.package_meta.outputs.artifact-name }}
      zip-name: ${{ steps.package_meta.outputs.zip-name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve package metadata
        id: package_meta
        run: |
          set -euo pipefail
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          artifact_name="${package_name}-${package_version}-chrome"
          echo "artifact-name=${artifact_name}" >> "$GITHUB_OUTPUT"
          echo "zip-name=${artifact_name}.zip" >> "$GITHUB_OUTPUT"

      - name: Type check
        run: npm run compile

      - name: Zip extension for Chrome
        run: npm run zip

      - name: Verify Chrome Web Store package
        run: |
          set -euo pipefail
          test -d .output/chrome-mv3
          test -f .output/chrome-mv3/manifest.json
          unzip -l ".output/${{ steps.package_meta.outputs.zip-name }}" manifest.json

      - name: Upload Chrome Web Store package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package_meta.outputs.artifact-name }}
          path: .output/chrome-mv3/
          if-no-files-found: error
          retention-days: 30
          include-hidden-files: true 
