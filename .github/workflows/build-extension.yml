name: Build Extension (Reusable)

on:
  workflow_call:
    outputs:
      artifact-name:
        description: "Name of the uploaded artifact"
        value: ${{ jobs.build.outputs.artifact-name }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: extension-build-${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run compile

      - name: Zip extension for Chrome
        run: npm run zip

      - name: Zip extension for Firefox
        run: npm run zip:firefox

      - name: Prepare extension packages
        run: |
          set -euo pipefail
          rm -rf artifacts
          mkdir -p artifacts
          cp .output/*.zip artifacts/
          ls -la artifacts/

      - name: Upload extension packages
        uses: actions/upload-artifact@v7
        with:
          name: extension-build-${{ github.sha }}
          path: artifacts/
          retention-days: 30
          include-hidden-files: true 
