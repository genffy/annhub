name: Package Chrome Extension

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: package-chrome-extension-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Build and zip Chrome MV3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run compile

      - name: Package Chrome extension
        run: npm run zip

      - name: Verify package
        run: |
          set -euo pipefail
          test -d .output/chrome-mv3
          test -f .output/chrome-mv3/manifest.json
          ls .output/*-chrome.zip

      - name: Prepare artifact files
        run: |
          set -euo pipefail
          rm -rf artifacts
          mkdir -p artifacts
          cp .output/*-chrome.zip artifacts/
          ls -la artifacts/

      - name: Upload Chrome package
        uses: actions/upload-artifact@v7
        with:
          name: chrome-extension-${{ github.sha }}
          path: artifacts/*-chrome.zip
          if-no-files-found: error
          retention-days: 30
