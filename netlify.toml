# Netlify 配置文件
# 文档: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # 基础目录保持在根目录，这样可以读取 .node-version
  base = "/"
  
  # 构建命令：先安装 website 依赖，再构建
  command = "cd website && npm install && npm run build"
  
  # 发布目录 - 使用 Next.js plugin 时会自动处理，不需要手动设置
  # publish = "website/.next"  # 注释掉，让插件自动处理
  
  # 只允许 production(main) 构建；main 上 website/ 无变化时也跳过。
  # Netlify 的 ignore 命令返回 0 表示跳过构建，返回非 0 才继续构建。
  ignore = "test \"$CONTEXT\" != \"production\" || git diff --quiet \"$CACHED_COMMIT_REF\" \"$COMMIT_REF\" -- website"

[build.environment]
  # Node.js 版本（会优先使用根目录的 .node-version，这里作为备用）
  NODE_VERSION = "24"
  
  # npm 配置
  NPM_FLAGS = "--legacy-peer-deps"

[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = false

[[redirects]]
  from = "/privacy-policy"
  to = "/privacy-policy.html"
  status = 200

[[redirects]]
  from = "/privacy-policy/"
  to = "/privacy-policy.html"
  status = 200

[[redirects]]
  from = "/terms-of-service"
  to = "/terms-of-service.html"
  status = 200

[[redirects]]
  from = "/terms-of-service/"
  to = "/terms-of-service.html"
  status = 200

# Netlify Essential Next.js Plugin - 自动处理 Next.js 部署
# 包括 SSR、图片优化、Middleware 等功能
# 注意：此插件不支持任何 inputs 配置项，图片优化会自动处理，无需手动配置
[[plugins]]
  package = "@netlify/plugin-nextjs"

# 非生产上下文不做自动部署；这里保留显式兜底，避免 UI 设置被误打开后跑构建。
[context.deploy-preview]
  ignore = "exit 0"

[context.branch-deploy]
  ignore = "exit 0"

# 生产环境配置
[context.production]
  command = "cd website && npm install && npm run build"
